# SPDX-License-Identifier: GPL-3.0-or-later
# TooTalk(p2p_msg) Phase 1 build workflow — macOS self-hosted arm64 + Windows windows-latest native.
# cycle 142 회수: cdrx wine image 영구 폐기 (Python 3.7 + cp1252 + PyQt6 6.7+ 호환 부재 3 cycle fail 누적) → windows-latest GitHub-hosted runner + native Python 3.13 + PyInstaller 마이그레이션.

name: build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 임시 빌드 태그
        required: false
        default: "manual"

jobs:
  build-macos:
    name: macOS arm64 (.app)
    # 한글 주석 — cycle 169.642: macos-15 swap 도 동일 Team ID mismatch 식별 (UUID 변경 만, error pattern 동일).
    # self-hosted runner 복귀 + Apple Developer ID proper sign 별 cycle 의무.
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
      - name: Python 3.13 venv + dev deps (brew python)
        # 한글 주석 — cycle 169.642: self-hosted runner 복귀 + brew python retain.
        # NFR-03 .app crash root cause = PyInstaller bootloader + Apple-signed Python framework
        # Team ID mismatch (macOS 26.4 strict enforcement). 4 회수 path 모두 시도 fail:
        # 1) spec ad-hoc / 2) post-build codesign / 3) brew Python / 4) macos-15 runner.
        # 본격 회수 = Apple Developer ID proper sign ($99/year) 또는 nuitka 대안 별 cycle.
        run: |
          /opt/homebrew/bin/python3.13 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r app/requirements.txt pyinstaller>=6.0
      - name: PyInstaller build (onefile)
        # 한글 주석 — cycle 169.651: NFR-03 Team ID mismatch 회수 path 1st — onefile mode swap.
        # build/tootalk_onefile.spec = a.binaries + a.zipfiles + a.datas 통합 EXE + BUNDLE direct wrap.
        # Apple-signed Python framework 의 standalone load 부재 → mismatch 회피 가능성.
        run: .venv/bin/pyinstaller build/tootalk_onefile.spec --clean --noconfirm
      - name: ad-hoc codesign (.app) — remove-signature first chain
        # 한글 주석 — cycle 169.631: brew Python 도 sealed signature retain. Team ID mismatch 잔존.
        # 회수: 1) dotfile clean → 2) per-file `codesign --remove-signature` (기존 Apple-signed strip) → 3) `--deep --force --options runtime --sign -` (ad-hoc resign 단일 Team ID).
        run: |
          find dist/TooTalk.app -name ".dylibs" -type d -prune -exec rm -rf {} + 2>/dev/null || true
          # 한글 주석 — per-file remove-signature (find + xargs chain, error suppress)
          find dist/TooTalk.app -type f \( -name "*.dylib" -o -name "*.so" -o -name "Python" -o -name "Qt*" \) -exec codesign --remove-signature {} \; 2>/dev/null || true
          codesign --remove-signature dist/TooTalk.app/Contents/MacOS/TooTalk 2>/dev/null || true
          codesign --deep --force --options runtime --sign - dist/TooTalk.app
          codesign -dv --verbose=2 dist/TooTalk.app 2>&1 | head -10 || true
      - name: Zip artifact
        run: |
          cd dist && zip -r "TooTalk-macos-arm64.zip" "TooTalk.app"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tootalk-macos-arm64
          path: dist/TooTalk-macos-arm64.zip
          retention-days: 30

  build-windows-native:
    name: Windows x64 native (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        shell: pwsh
        run: |
          # UTF-8 강제 — Windows native console default cp949 회피 (한글 주석 포함 requirements.txt 정합)
          $env:PYTHONIOENCODING = "utf-8"
          $env:PYTHONUTF8 = "1"
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install "pyinstaller>=6.0"
      - name: PyInstaller build
        shell: pwsh
        run: |
          $env:PYTHONIOENCODING = "utf-8"
          $env:PYTHONUTF8 = "1"
          pyinstaller build/tootalk.spec --clean --noconfirm --distpath dist-windows --workpath build/work-win
      - name: Verify artifact
        shell: pwsh
        run: |
          # PyInstaller 산출 디렉토리 (또는 단일 exe) 존재 확인 — fail-fast
          Get-ChildItem -Recurse dist-windows
          if (-not (Test-Path "dist-windows/TooTalk")) {
            throw "dist-windows/TooTalk 디렉토리 부재 — PyInstaller 산출 실패"
          }
      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "dist-windows/TooTalk" -DestinationPath "dist-windows/TooTalk-windows-x64.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tootalk-windows-x64
          path: dist-windows/TooTalk-windows-x64.zip
          retention-days: 30
