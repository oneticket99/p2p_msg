# =============================================================================
# ci.yml — TooTalk(p2p_msg) 기본 CI 게이트
# -----------------------------------------------------------------------------
# 본 워크플로우는 PR + main push 시점에 다음 7 게이트를 강제한다.
#   1) docs-lint       — markdownlint-cli2 + tools/doc-lint.sh
#   2) root-18-freeze  — 루트 .md 정확히 18개 (정본 §K)
#   3) m1-doc-precedence — 코드 변경 PR 에 docs/ 동행 변경 검증
#   4) m2-readme-history — README.md "변경 이력" 헤더 존재 검증
#   5) m3-history-prepend — History.md 첫 Phase 헤더 최신 일자 prepend 검증
#   6) m4-korean-comments — 신규/수정 .py/.js/.html/.css/.sql/.sh 한글 주석 1줄 이상
#   7) import-smoke    — app/server import 매트릭스 (macOS arm64 + Windows x64)
#
# 정책 정합:
#   - 사용자 directive 2026-05-17 — CI = self-hosted macOS arm64 단독
#     + Windows 빌드 = GitHub-hosted Ubuntu (wine cross-compile, build.yml 후반)
#   - runner 라벨: [self-hosted, macOS, arm64]
#   - Windows self-hosted runner 의무 = 영구 회수 (wine 대체)
#   - 정본 §L 등가 — 게이트 1건 FAIL = PR merge 차단
#
# 보안 노트:
#   - github.event.* 입력은 모두 env: 블록 경유 (workflow injection 회피)
#   - base/head SHA 는 40자 hex 보장이지만 best practice 일괄 적용
# =============================================================================

name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # docs-lint — markdown + frontmatter + 깨진 링크 + BPE 위생
  # ---------------------------------------------------------------------------
  docs-lint:
    name: docs-lint (markdown · frontmatter · BPE 위생)
    runs-on: [self-hosted, macOS, arm64]
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: markdownlint-cli2 실행
        run: |
          # 노드 사전 설치 가정. 미설치 시 brew install node 안내
          npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#.venv" "#dist" "#build"

      - name: tools/doc-lint.sh 실행
        run: bash tools/doc-lint.sh

  # ---------------------------------------------------------------------------
  # meta-enforcement — enforcement layer 자기검증 (L5)
  # ---------------------------------------------------------------------------
  meta-enforcement:
    name: meta-enforcement (L5)
    runs-on: [self-hosted, macOS, arm64]
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: brew python@3.13 PATH 등록
        if: runner.os == 'macOS'
        run: echo "/opt/homebrew/opt/python@3.13/libexec/bin" >> $GITHUB_PATH

      - name: meta-enforcement 실행
        run: python tools/meta_enforce.py

  # ---------------------------------------------------------------------------
  # root-18-freeze — 루트 마크다운 정확히 18개 동결 (정본 §K)
  # ---------------------------------------------------------------------------
  root-18-freeze:
    name: root-18-freeze (정본 §K)
    runs-on: [self-hosted, macOS, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: 루트 .md 카운트 검증
        run: |
          COUNT=$(ls -1 *.md 2>/dev/null | wc -l | tr -d ' ')
          echo "루트 .md = $COUNT"
          if [ "$COUNT" != "18" ]; then
            echo "::error::루트 마크다운 동결 위반 — 정확히 18 필요, 현재 $COUNT"
            ls -1 *.md
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # m1-doc-precedence — 코드 변경 PR 에 문서 동행 강제
  # ---------------------------------------------------------------------------
  m1-doc-precedence:
    name: m1-doc-precedence (M1)
    runs-on: [self-hosted, macOS, arm64]
    if: github.event_name == 'pull_request'
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR 변경 파일 분석
        run: |
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "변경 파일:"
          echo "$CHANGED"

          CODE_CHANGED=$(echo "$CHANGED" | grep -E '^(app/|server/|tools/)' | grep -vE '\.md$' || true)
          DOC_CHANGED=$(echo "$CHANGED" | grep -E '^(docs/|.*\.md$)' || true)

          if [ -n "$CODE_CHANGED" ] && [ -z "$DOC_CHANGED" ]; then
            echo "::error::M1 위반 — 코드 변경 시 문서 동행 필요 (docs/ 또는 .md)"
            echo "코드 변경:"
            echo "$CODE_CHANGED"
            exit 1
          fi
          echo "M1 게이트 통과"

  # ---------------------------------------------------------------------------
  # m2-readme-history — README.md "변경 이력" 헤더 존재 검증
  # ---------------------------------------------------------------------------
  m2-readme-history:
    name: m2-readme-history (M2)
    runs-on: [self-hosted, macOS, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: README.md 변경 이력 헤더 검증
        run: |
          # 헤더 형식 = `## 변경 이력` 또는 `## N. 변경 이력` (optional number prefix)
          if ! grep -qE '^##\s+([0-9]+\.\s+)?변경\s*이력' README.md; then
            echo "::error::M2 위반 — README.md 에 '## 변경 이력' 섹션 필요"
            exit 1
          fi
          echo "M2 게이트 통과"

  # ---------------------------------------------------------------------------
  # m3-history-prepend — History.md Phase 헤더 역순 (최신 상단) 검증
  # ---------------------------------------------------------------------------
  m3-history-prepend:
    name: m3-history-prepend (M3)
    runs-on: [self-hosted, macOS, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: History.md Phase 헤더 순서 검증
        run: |
          # Phase 헤더 형식 = `## Phase N <title> (YYYY-MM-DD ...)` — date 추출 후 내림차순 비교
          # bash -e + grep 매치 0 line → exit 1 회피 = `|| true` 추가
          DATES=$(grep -E '^## Phase' History.md | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' || true)
          if [ -z "$DATES" ]; then
            echo "::warning::History.md Phase 헤더 미발견 — 검증 skip"
            exit 0
          fi
          SORTED=$(echo "$DATES" | sort -r)
          if [ "$DATES" != "$SORTED" ]; then
            echo "::error::M3 위반 — History.md Phase 헤더 역순 정렬 어긋남"
            echo "현재 순서:"; echo "$DATES"
            echo "기대 순서:"; echo "$SORTED"
            exit 1
          fi
          echo "M3 게이트 통과"

  # ---------------------------------------------------------------------------
  # m4-korean-comments — 신규/수정 코드 파일 한글 주석 1줄 이상
  # ---------------------------------------------------------------------------
  m4-korean-comments:
    name: m4-korean-comments (M4)
    runs-on: [self-hosted, macOS, arm64]
    if: github.event_name == 'pull_request'
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 한글 주석 존재 검증
        run: |
          # 신규 + 수정 대상 .py .js .html .css .sql .sh
          TARGETS=$(git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '\.(py|js|html|css|sql|sh)$' || true)
          if [ -z "$TARGETS" ]; then
            echo "검증 대상 코드 파일 없음 — skip"
            exit 0
          fi
          FAIL=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ ! -f "$f" ] && continue
            # 한글 (가-힣) 포함 라인 1줄 이상 존재 여부
            if ! grep -qE '[가-힣]' "$f"; then
              echo "::error::M4 위반 — 한글 주석 0줄: $f"
              FAIL=1
            fi
          done <<< "$TARGETS"
          if [ "$FAIL" = "1" ]; then exit 1; fi
          echo "M4 게이트 통과"

  # ---------------------------------------------------------------------------
  # import-smoke — Python 3.13 + app/server 모듈 import 가능성 검증
  # ---------------------------------------------------------------------------
  import-smoke:
    name: import-smoke (${{ matrix.label }})
    # Windows-x64 entry 영구 비활성 — wine cross-compile 대체 (사용자 directive 2026-05-17)
    # Windows 빌드 의무 = build.yml (Phase 1 후반 신설) 의 GitHub-hosted Ubuntu +
    # cdrx/pyinstaller-windows docker image. 본 ci.yml 의 import-smoke/pytest = macOS arm64 단독.
    # 정합 정책: 영구 메모리 project_windows_build_via_wine.md + AGENTS.md §1 빌드 row.
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS-arm64
            runner: [self-hosted, macOS, arm64]
          # - label: Windows-x64
          #   runner: [self-hosted, Windows, x64]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: brew python@3.13 PATH 등록 (macOS — `python` symlink 활성)
        if: runner.os == 'macOS'
        run: echo "/opt/homebrew/opt/python@3.13/libexec/bin" >> $GITHUB_PATH

      - name: venv 생성 + PATH 등록 (PEP 668 externally-managed 회피)
        # brew python 의 자체 protection 정책 의 venv 격리 의무
        # GitHub Actions 의 step 간 venv 의 persistence = $GITHUB_PATH + $GITHUB_ENV 등록
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV

      - name: Python 버전 확인
        run: python --version

      - name: app/server 의존성 설치
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt
          python -m pip install -r server/requirements.txt

      - name: server 모듈 import smoke
        run: python -c "import server.main; print('server.main OK')"

      - name: app 모듈 import smoke
        # PyQt6 헤드리스 환경 미지원 가능 — 모듈 import 만 검증
        run: python -c "import app.main; print('app.main OK')"

  # ---------------------------------------------------------------------------
  # pytest — DESIGN.md §10 정합 (사용자 directive 2026-05-17)
  # 단위 테스트 + integration (e2e 측 별도 nightly)
  # ---------------------------------------------------------------------------
  pytest:
    name: pytest (${{ matrix.label }})
    # cycle 169.564: timeout-minutes 20 추가 — PyQt6/qasync stale hang 회피 (cycle 169.541 ci 5h stuck pattern)
    timeout-minutes: 20
    # Windows-x64 entry 영구 비활성 — wine cross-compile 대체 (사용자 directive 2026-05-17)
    # Windows 빌드 의무 = build.yml (Phase 1 후반 신설) 의 GitHub-hosted Ubuntu +
    # cdrx/pyinstaller-windows docker image. 본 ci.yml 의 import-smoke/pytest = macOS arm64 단독.
    # 정합 정책: 영구 메모리 project_windows_build_via_wine.md + AGENTS.md §1 빌드 row.
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS-arm64
            runner: [self-hosted, macOS, arm64]
          # - label: Windows-x64
          #   runner: [self-hosted, Windows, x64]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: brew python@3.13 PATH 등록 (macOS — `python` symlink 활성)
        if: runner.os == 'macOS'
        run: echo "/opt/homebrew/opt/python@3.13/libexec/bin" >> $GITHUB_PATH

      - name: venv 생성 + PATH 등록 (PEP 668 externally-managed 회피)
        # brew python 의 자체 protection 정책 의 venv 격리 의무
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV

      - name: Python 버전 확인
        run: python --version

      - name: 개발 의존성 설치 (pytest + coverage)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements-dev.txt
          python -m pip install -r server/requirements-dev.txt

      - name: pytest 실행 (unit only — integration + e2e 제외)
        # cycle 169.566: pytest hang root cause = PyQt6/qasync event loop stuck pattern.
        # fix chain: -x (fail-fast) + --ignore=tests/e2e (Playwright 별 nightly) + --ignore=tests/integration (네트워크 의존).
        # 잔존 hang 시점 = timeout-minutes 20 (cycle 169.564) abort.
        run: pytest --cov --cov-report=term-missing -x --ignore=tests/e2e --ignore=tests/integration

      - name: coverage 80% 게이트 (DESIGN.md §10.5 정합)
        if: success()
        # 한글 주석 — cycle 169.508 — continue-on-error 제거 (codex review 2.4 회수).
        # 본격 차단 gate 의무. PR 머지 차단 정합.
        run: python -m coverage report --fail-under=80
