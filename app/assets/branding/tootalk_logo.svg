<?xml version="1.0" encoding="UTF-8"?>
<!--
  SPDX-License-Identifier: GPL-3.0-or-later
  TooTalk 로고 (full) — Toonation 공식 +OO symbol vector path + Talk 흰색 wordmark.
  사용자 directive 2026-05-20 cycle 169 — "완전히 똑같이 svg로 만들라는거야" (100% vector + raster embed 부재).

  symbol = "Too" typography (plus + cyan ring + blue ring)
    - plus (T 등가) = #0066FF blue rounded bar 2
    - 좌측 ring (첫 O) = #22D3EE cyan stroke
    - 우측 ring (둘째 O) = #0066FF blue stroke
  Talk = 흰색 #ffffff bold wordmark
  viewBox = 480 × 120 (symbol 270 + Talk 210)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" role="img" aria-label="TooTalk logo">
  <title>TooTalk</title>
  <desc>Toonation 공식 +OO symbol (Too typography) + Talk 흰색 wordmark — 100% vector.</desc>

  <!-- plus icon (T 등가) — Toonation blue primary, 좌측 영역 -->
  <g fill="#0066FF">
    <!-- 가로 bar -->
    <rect x="20" y="48" width="60" height="24" rx="12" ry="12"/>
    <!-- 세로 bar -->
    <rect x="38" y="30" width="24" height="60" rx="12" ry="12"/>
  </g>

  <!-- 좌측 ring (첫 O) — Toonation cyan -->
  <circle cx="135" cy="60" r="28" fill="none" stroke="#22D3EE" stroke-width="16"/>

  <!-- 우측 ring (둘째 O) — Toonation blue primary, 좌측 ring 와 약간 overlap -->
  <circle cx="200" cy="60" r="28" fill="none" stroke="#0066FF" stroke-width="16"/>

  <!-- Talk wordmark — 흰색 bold -->
  <text x="250" y="80"
        font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-2">Talk</text>
</svg>
