<?xml version="1.0" encoding="UTF-8"?>
<!--
  SPDX-License-Identifier: GPL-3.0-or-later
  TooTalk 로고 — Toonation "+OO" 패턴 + "Talk" wordmark (사용자 directive 2026-05-21).
  ws_CD/static/apple-touch-icon.png 의 SVG 등가 변환 + Talk 텍스트 부착.

  vertical 100 + horizontal 380 viewBox. plus + 2 ring + Talk wordmark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" role="img" aria-label="TooTalk logo">
  <title>TooTalk</title>
  <desc>Toonation +OO 로고 + Talk wordmark — Phase 3 차별화 의 브랜드 통합.</desc>

  <!-- plus 아이콘 (의 stylized "T") — medium blue rounded bars -->
  <g fill="#4B95FC">
    <rect x="10" y="40" width="50" height="20" rx="10" ry="10"/>
    <rect x="25" y="25" width="20" height="50" rx="10" ry="10"/>
  </g>

  <!-- 좌측 ring (light blue) — 의 첫 O -->
  <circle cx="98" cy="50" r="22" fill="none" stroke="#A8C5FF" stroke-width="14"/>

  <!-- 우측 ring (medium blue) — 의 두번째 O -->
  <circle cx="148" cy="50" r="22" fill="none" stroke="#4B95FC" stroke-width="14"/>

  <!-- Talk wordmark — dark slate sans-serif bold -->
  <text x="186" y="68" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="48" font-weight="700" fill="#1F2937" letter-spacing="-1.5">Talk</text>
</svg>
