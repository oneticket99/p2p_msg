  TooTalk 로고 (full) — Toonation BI 가이드 정합 (FRONTEND.md §15).
  cycle 153 phase 1 색상 회수 — primary #0066FF + cyan #22D3EE + Deep Navy #0F172A.

  vertical 100 + horizontal 380 viewBox. plus + 2 ring + Talk wordmark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" role="img" aria-label="TooTalk logo">
  <title>TooTalk</title>
  <desc>Toonation BI 정합 — primary #0066FF + cyan #22D3EE + Deep Navy #0F172A.</desc>

  <!-- plus 아이콘 (T 등가) — Toonation Blue primary -->
  <g fill="#0066FF">
    <rect x="10" y="40" width="50" height="20" rx="10" ry="10"/>
    <rect x="25" y="25" width="20" height="50" rx="10" ry="10"/>
  </g>

  <!-- 좌측 ring (첫 O) — 포인트 네온 cyan -->
  <circle cx="98" cy="50" r="22" fill="none" stroke="#22D3EE" stroke-width="14"/>

  <!-- 우측 ring (둘째 O) — Toonation Blue primary -->
  <circle cx="148" cy="50" r="22" fill="none" stroke="#0066FF" stroke-width="14"/>

  <!-- Talk wordmark — Deep Navy -->
  <text x="186" y="68" font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="48" font-weight="700" fill="#0F172A" letter-spacing="-1.5">Talk</text>
</svg>
