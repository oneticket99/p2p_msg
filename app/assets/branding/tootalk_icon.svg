<?xml version="1.0" encoding="UTF-8"?>
<!--
  SPDX-License-Identifier: GPL-3.0-or-later
  TooTalk 아이콘 (icon-only) — Toonation 공식 +OO symbol vector path (cycle 169 회수).
  사용자 directive 2026-05-20 — "완전히 똑같이 svg로 만들라는거야" (100% vector + raster 부재).

  symbol = plus + 2 ring (Too typography), Talk wordmark 부재 (icon 만).
  viewBox = 240 × 120 — logo 와 동일 비율 + symbol 부분 만.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120" role="img" aria-label="TooTalk icon">
  <title>TooTalk</title>
  <desc>TooTalk +OO symbol icon — 100% vector tray + favicon 용.</desc>

  <!-- plus icon (T 등가) — blue -->
  <g fill="#0066FF">
    <rect x="20" y="48" width="60" height="24" rx="12" ry="12"/>
    <rect x="38" y="30" width="24" height="60" rx="12" ry="12"/>
  </g>

  <!-- 좌측 ring — cyan -->
  <circle cx="135" cy="60" r="28" fill="none" stroke="#22D3EE" stroke-width="16"/>

  <!-- 우측 ring — blue -->
  <circle cx="200" cy="60" r="28" fill="none" stroke="#0066FF" stroke-width="16"/>
</svg>
