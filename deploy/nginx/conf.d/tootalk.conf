# TooTalk nginx virtual host — Phase 4 reverse proxy + 8 location.
# 한글 주석: 데모 서버 (114.207.112.73) 의 server_name IP direct (도메인 미결정 동안).

# ─── HTTP (80) — Let's Encrypt webroot challenge + 의 443 redirect ──────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME challenge — Let's Encrypt 인증서 갱신 의무
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # 모든 그 외 trafffic = HTTPS redirect (production)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS (443) — TLS termination + reverse proxy ──────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # 한글 주석: TLS — Let's Encrypt 인증서 (cycle 105 의 certbot 통합)
    # production = mail.tootalk.demo 또는 데모 IP self-signed
    ssl_certificate /etc/letsencrypt/live/tootalk.demo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tootalk.demo/privkey.pem;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=60s;
    resolver_timeout 2s;

    # 한글 주석: 보안 header 5종
    add_header Strict-Transport-Security $strict_transport_security always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'" always;

    # 한글 주석: request_id 의 upstream 전파 (Phase 4 Item 4 logging 정합)
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ─── location 1 — 인증 endpoint (signup/login/OTP) ──────────────────
    location ~ ^/api/auth/(signup|login|otp|password_reset) {
        limit_req zone=auth_zone burst=5 nodelay;
        proxy_pass http://web:8080;
    }

    # ─── location 2 — 봇 endpoint (per-user rate) ────────────────────────
    location /api/bot/ {
        limit_req zone=bot_zone burst=10 nodelay;
        proxy_pass http://web:8080;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ─── location 3 — 파일 upload ────────────────────────────────────────
    location ~ ^/api/files/(upload|chunk) {
        limit_req zone=upload_zone burst=10 nodelay;
        client_max_body_size 100M;
        proxy_pass http://web:8080;
        proxy_request_buffering off;
    }

    # ─── location 4 — 일반 REST API ──────────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=30 nodelay;
        proxy_pass http://web:8080;
    }

    # ─── location 5 — WebSocket 시그널링 (upgrade) ───────────────────────
    location /ws {
        limit_conn ws_conn 5;
        proxy_pass http://ws:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─── location 6 — health check (외부 모니터링) ───────────────────────
    location /healthz {
        proxy_pass http://web:8080/healthz;
        access_log off;
    }

    # ─── location 7 — 정적 파일 (docs/html 등 향후) ──────────────────────
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── location 8 — 그 외 (404) ────────────────────────────────────────
    location / {
        return 404 '{"error":"not_found"}';
        default_type application/json;
    }
}
