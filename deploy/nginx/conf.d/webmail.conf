# webmail.dopa.co.kr nginx virtual host — cycle 169.858 M2
# Exec Plan: docs/exec-plans/active/2026-06-09-webmail-python-backend.md
#
# 한글 주석: webmail 서브도메인 별도 server block. tootalk.conf 의 server_name `_`
# catch-all 보다 명시적 server_name 매치가 우선 (nginx 표준 동작).
# upstream `webmail:8090` = M3 후속 cycle 169.859 에서 docker-compose 추가 예정.
# 본 cycle 단계 = nginx vhost forward-looking infrastructure — backend 부재 시 502 정상.

# ─── HTTP (80) — 별도 server block 부재 ───────────────────────────────────
# 한글 주석: 80 traffic 은 기존 tootalk.conf 의 `_` catch-all HTTP server 가 처리한다.
# ACME challenge `/.well-known/acme-challenge/` + 그 외 traffic 의 HTTPS 301 redirect
# 양쪽 모두 tootalk.conf 정합. webmail 전용 HTTP block 신설 불요.

# ─── HTTPS (443) — webmail TLS termination + reverse proxy ────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name webmail.dopa.co.kr;

    # 한글 주석: TLS — webmail 별도 Let's Encrypt cert (G-final SSH 수동 발급)
    # 명령: certbot certonly --standalone -d webmail.dopa.co.kr
    ssl_certificate /etc/letsencrypt/live/webmail.dopa.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webmail.dopa.co.kr/privkey.pem;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=60s;
    resolver_timeout 2s;

    # 한글 주석: 보안 header — tootalk.conf 정합 5종 + CSP 메일 본문 정합 완화
    # img-src https: = 외부 이미지 표시 (메일 본문 안 원격 이미지 정합)
    # script-src 'unsafe-inline' = HTMX 인라인 스크립트 정합
    add_header Strict-Transport-Security $strict_transport_security always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" always;

    # 한글 주석: request_id 의 upstream 전파 (Phase 4 Item 4 logging 정합)
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # 한글 주석: 첨부 upload 한도 = 25M (메일 첨부 표준)
    # tootalk.conf 의 100M 보다 낮음 — 메일 사용자 기대 정합
    client_max_body_size 25M;

    # ─── location 1 — 정적 자산 (CSS / JS / icon) ─────────────────────────
    # 한글 주석: nginx 가 직접 serve — backend round-trip 회피
    location /static/ {
        alias /usr/share/nginx/html/webmail-static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── location 2 — health check (외부 모니터링) ────────────────────────
    # 한글 주석: docker compose healthcheck + 외부 모니터링 endpoint
    location /healthz {
        proxy_pass http://webmail:8090/healthz;
        access_log off;
    }

    # ─── location 3 — REST API (향후 M4+ 분리 예정) ───────────────────────
    # 한글 주석: 현 cycle = backend 부재로 502 정상, M3 후 활성
    location /api/ {
        proxy_pass http://webmail:8090;
    }

    # ─── location 4 — 그 외 모든 traffic = webmail backend forward ────────
    # 한글 주석: SPA 부재 server-side render (Jinja2 + HTMX) 정합 — 단순 forward
    location / {
        proxy_pass http://webmail:8090;
    }
}
