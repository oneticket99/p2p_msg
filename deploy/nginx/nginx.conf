# TooTalk nginx base config — Phase 4 reverse proxy + TLS + rate limit.
# 한글 주석: worker 설정 + log format + 의 mime types + 의 conf.d include.

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 한글 주석: log format 의 JSON 등가 — Phase 4 logging Item 4 정합
    log_format main_kst escape=json
        '{"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"request_id":"$request_id"}';
    access_log /var/log/nginx/access.log main_kst;

    # 한글 주석: 기본 성능 + 보안 튜닝
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    server_tokens off;
    client_max_body_size 25M;
    client_body_buffer_size 128k;
    large_client_header_buffers 4 16k;

    # 한글 주석: gzip 압축 — HTML / JSON / SVG / CSS / JS
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml text/css text/plain text/xml;

    # ─── Rate limit zone 5종 (Item 3 §4.4 정합) ─────────────────────────────
    # 인증 endpoint (login + signup + OTP) — IP 별 10 req/min 보호
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
    # 일반 API — user_id 별 60 req/min
    limit_req_zone $http_x_user_id zone=api_zone:10m rate=60r/m;
    # 봇 endpoint — user_id 별 20 req/min (BOT_RATE_PER_MINUTE 정합)
    limit_req_zone $http_x_user_id zone=bot_zone:10m rate=20r/m;
    # 파일 업로드 — IP 별 30 req/min
    limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=30r/m;
    # WebSocket — IP 별 10 conn (동시 연결 한도)
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # ─── 보안 header default (server block 안 의 override 가능) ─────────────
    map $sent_http_content_type $strict_transport_security {
        default "max-age=63072000; includeSubDomains; preload";
    }

    # ─── Trusted proxy — Docker bridge 의 X-Forwarded-For 의 신뢰 ──────────
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ─── conf.d include — virtual host + cert 의 별개 파일 ──────────────────
    include /etc/nginx/conf.d/*.conf;
}
