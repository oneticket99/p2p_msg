# TooTalk docker-compose production override — 데모 서버 (114.207.112.73) 전용.
# 사용: `docker compose -f docker-compose.yml -f docker-compose.production.yml --env-file .env.production up -d`
# 한글 주석: secrets + healthcheck + resource limit + restart policy 강화.

services:
  mariadb:
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
        reservations:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postfix:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      LOG_FORMAT: json
      LOG_LEVEL: INFO

  ws:
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      LOG_FORMAT: json
      LOG_LEVEL: INFO

  nginx:
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "10"
