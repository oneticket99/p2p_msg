# TooTalk(p2p_msg) Phase 4 docker-compose — 본 base 의 service 6종 통합 stack.
# 정합 = docs/exec-plans/active/2026-05-22-phase4-infra-setup.md §2 (Item 1).
# override = docker-compose.local.yml (mariadb + smtp 만) / .production.yml (전체 + secrets).
# 한글 주석: 데모 서버 (114.207.112.73) 의 production 진입 base. IP direct (도메인 미결정 동안).

name: tootalk

services:

  # ─── DB layer ────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: tootalk-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD 의무}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-tootalk}
      MARIADB_USER: ${MARIADB_USER:-tootalk}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD 의무}
      TZ: Asia/Seoul
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb/my.cnf:/etc/mysql/conf.d/tootalk.cnf:ro
      - ../server/db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - tootalk-internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── SMTP layer (OTP 발송) ─────────────────────────────────────────────────
  postfix:
    build:
      context: ./postfix
      dockerfile: Dockerfile
    container_name: tootalk-postfix
    restart: unless-stopped
    environment:
      MAILDOMAIN: ${SMTP_DOMAIN:-tootalk.demo}
      DKIM_SELECTOR: ${DKIM_SELECTOR:-tootalk}
      TZ: Asia/Seoul
    volumes:
      - ./postfix/main.cf:/etc/postfix/main.cf:ro
      - ./postfix/dkim:/etc/opendkim/keys:ro
      - postfix_spool:/var/spool/postfix
    networks:
      - tootalk-internal
    ports:
      - "25:25"
      - "587:587"

  # ─── web (REST API) ──────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: deploy/web/Dockerfile
    container_name: tootalk-web
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      postfix:
        condition: service_started
    environment:
      TZ: Asia/Seoul
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${MARIADB_USER:-tootalk}
      DB_PASSWORD: ${MARIADB_PASSWORD:?DB_PASSWORD 의무}
      DB_NAME: ${MARIADB_DATABASE:-tootalk}
      SMTP_HOST: postfix
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      BOT_ENABLED: ${BOT_ENABLED:-0}
      BOT_RATE_PER_MINUTE: ${BOT_RATE_PER_MINUTE:-20}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CREDENTIAL_PATH: /run/secrets/fcm_service_account.json
    secrets:
      - fcm_service_account.json
    networks:
      - tootalk-internal
      - tootalk-edge
    expose:
      - "8080"

  # ─── ws (시그널링 WebSocket) ───────────────────────────────────────────────
  ws:
    build:
      context: ..
      dockerfile: deploy/web/Dockerfile
    container_name: tootalk-ws
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      TZ: Asia/Seoul
      SIGNAL_SERVER_WS_PORT: 8765
      SIGNAL_SERVER_MODE: ws
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${MARIADB_USER:-tootalk}
      DB_PASSWORD: ${MARIADB_PASSWORD:?DB_PASSWORD 의무}
      DB_NAME: ${MARIADB_DATABASE:-tootalk}
    networks:
      - tootalk-internal
      - tootalk-edge
    expose:
      - "8765"

  # ─── nginx (TLS + reverse proxy + rate limit, Item 3 본문) ────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: tootalk-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      ws:
        condition: service_started
    environment:
      TZ: Asia/Seoul
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_cache:/var/cache/nginx
      - letsencrypt:/etc/letsencrypt:ro
    networks:
      - tootalk-edge
    ports:
      - "80:80"
      - "443:443"

# ─── networks ──────────────────────────────────────────────────────────────
networks:
  # internal — DB + SMTP + web + ws + fcm 의 isolated bridge
  tootalk-internal:
    driver: bridge
    internal: false
  # edge — nginx ↔ web/ws 의 격리된 bridge
  tootalk-edge:
    driver: bridge

# ─── volumes (named, persistent) ────────────────────────────────────────────
volumes:
  mariadb_data:
    driver: local
  postfix_spool:
    driver: local
  nginx_cache:
    driver: local
  letsencrypt:
    driver: local

# ─── secrets (Docker secret mount, .env 외부 격리) ─────────────────────────
secrets:
  fcm_service_account.json:
    file: ./secrets/fcm_service_account.json
