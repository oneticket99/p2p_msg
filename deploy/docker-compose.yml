# TooTalk(p2p_msg) Phase 4 docker-compose — 본 base 의 service 6종 통합 stack.
# 정합 = docs/exec-plans/active/2026-05-22-phase4-infra-setup.md §2 (Item 1).
# override = docker-compose.local.yml (mariadb + smtp 만) / .production.yml (전체 + secrets).
# 한글 주석: 데모 서버 (114.207.112.73) 의 production 진입 base. IP direct (도메인 미결정 동안).

name: tootalk

services:

  # ─── DB layer ────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: tootalk-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD 의무}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-tootalk}
      MARIADB_USER: ${MARIADB_USER:-tootalk}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD 의무}
      TZ: Asia/Seoul
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb/my.cnf:/etc/mysql/conf.d/tootalk.cnf:ro
      - ../server/db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - tootalk-internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── SMTP layer (OTP 발송) ─────────────────────────────────────────────────
  postfix:
    build:
      context: ./postfix
      dockerfile: Dockerfile
    container_name: tootalk-postfix
    restart: unless-stopped
    # cycle 152 — 데모 서버 (114.207.112.73) 안 host postfix (mail.dopa.co.kr) 실 운영 중
    # → container postfix = profile separation (host port 25 conflict 차단)
    profiles: ["postfix-container"]
    environment:
      MAILDOMAIN: ${SMTP_DOMAIN:-tootalk.demo}
      DKIM_SELECTOR: ${DKIM_SELECTOR:-tootalk}
      TZ: Asia/Seoul
    volumes:
      - ./postfix/main.cf:/etc/postfix/main.cf:ro
      - ./postfix/dkim:/etc/opendkim/keys:ro
      - postfix_spool:/var/spool/postfix
    networks:
      - tootalk-internal
    ports:
      - "25:25"
      - "587:587"

  # ─── web (REST API) ──────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: deploy/web/Dockerfile
    container_name: tootalk-web
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      TZ: Asia/Seoul
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${MARIADB_USER:-tootalk}
      DB_PASSWORD: ${MARIADB_PASSWORD:?DB_PASSWORD 의무}
      DB_NAME: ${MARIADB_DATABASE:-tootalk}
      # cycle 152 — host postfix (mail.dopa.co.kr) 실 운영 + container postfix profile separation
      SMTP_HOST: ${SMTP_HOST:-mail.dopa.co.kr}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      BOT_ENABLED: ${BOT_ENABLED:-0}
      BOT_RATE_PER_MINUTE: ${BOT_RATE_PER_MINUTE:-20}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CREDENTIAL_PATH: /run/secrets/fcm_service_account.json
      # cycle 132~151 신규 service 의 환경변수 chain — 신규 endpoint 의 의무 주입.
      # 모두 graceful 부재 가능 (모듈 의 lazy import + try/except).
      # i18n (cycle 132 Phase 5 Item 1) — 기본 ko + 지원 5종 (ko/en/ja/zh/es).
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-ko}
      # 자동 업데이트 (cycle 132 version_handlers) — 데모 서버 의 release 채널 base URL.
      AUTO_UPDATE_BASE_URL: ${AUTO_UPDATE_BASE_URL:-http://localhost:8080}
      # bot streaming (cycle 138~151 chzzk/twitch/kick/youtube) — provider 별 토큰 graceful.
      CHZZK_CHANNEL_ID: ${CHZZK_CHANNEL_ID:-}
      TWITCH_OAUTH_TOKEN: ${TWITCH_OAUTH_TOKEN:-}
      KICK_CHANNEL_ID: ${KICK_CHANNEL_ID:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      # OBS websocket (cycle 145) — 로컬 OBS Studio 의 websocket 4444 의무.
      OBS_WEBSOCKET_URL: ${OBS_WEBSOCKET_URL:-}
      OBS_WEBSOCKET_PASSWORD: ${OBS_WEBSOCKET_PASSWORD:-}
      # Toonation (cycle 142~143) — donation alert API. graceful 부재.
      TOONATION_API_KEY: ${TOONATION_API_KEY:-}
      # web service REST mode — server.main 안 SIGNAL_SERVER_WS_PORT env 기반 listen.
      # nginx upstream `web:8080` 정합 의무 — cycle 152 deploy chain 회수.
      SIGNAL_SERVER_WS_PORT: 8080
      SIGNAL_SERVER_MODE: rest
      DB_ENABLED: 1
    secrets:
      - fcm_service_account.json
    networks:
      - tootalk-internal
      - tootalk-edge
    expose:
      - "8080"

  # ─── ws (시그널링 WebSocket) ───────────────────────────────────────────────
  ws:
    build:
      context: ..
      dockerfile: deploy/web/Dockerfile
    container_name: tootalk-ws
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      TZ: Asia/Seoul
      SIGNAL_SERVER_WS_PORT: 8765
      SIGNAL_SERVER_MODE: ws
      # 한글 주석 — cycle 169.540: DB_ENABLED 추가 (web service 와 정합, auth endpoint 500 회수)
      DB_ENABLED: 1
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${MARIADB_USER:-tootalk}
      DB_PASSWORD: ${MARIADB_PASSWORD:?DB_PASSWORD 의무}
      DB_NAME: ${MARIADB_DATABASE:-tootalk}
      # 한글 주석 — cycle 169.545: bot provider env (readyz `bot_provider: absent` 회수 — web service 와 정합)
      BOT_ENABLED: ${BOT_ENABLED:-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    networks:
      - tootalk-internal
      - tootalk-edge
    # 한글 주석 — cycle 169.538: host 8765 bind 추가 (외부 ws://host:8765/ws 직접 access)
    # 본 저장소 README §3 + app/main config 정합 의무. nginx proxy 경유 = port 443 path 와 병립.
    ports:
      - "8765:8765"
    expose:
      - "8765"
    # 한글 주석 — cycle 169.540: Dockerfile HEALTHCHECK 가 8080 hardcoded → ws service (8765 listen) 의 mismatch.
    # service level override → 8765 port + /healthz endpoint 의 정합.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8765/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── certbot (Let's Encrypt 인증서 발급/갱신, cycle 112) ──────────────────
  # 한글 주석: profile "certbot" 의 명시 활성 시 만 기동 (`--profile certbot up`).
  # 본 service = one-shot 의 init/renew script trigger 대응. cron 등록 권장.
  certbot:
    image: certbot/certbot:latest
    container_name: tootalk-certbot
    profiles: ["certbot"]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --quiet --no-eff-email
    networks:
      - tootalk-edge

  # ─── nginx (TLS + reverse proxy + rate limit, Item 3 본문) ────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: tootalk-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      ws:
        condition: service_started
    environment:
      TZ: Asia/Seoul
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_cache:/var/cache/nginx
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - tootalk-edge
    ports:
      - "80:80"
      - "443:443"

# ─── networks ──────────────────────────────────────────────────────────────
networks:
  # internal — DB + SMTP + web + ws + fcm 의 isolated bridge
  tootalk-internal:
    driver: bridge
    internal: false
  # edge — nginx ↔ web/ws 의 격리된 bridge
  tootalk-edge:
    driver: bridge

# ─── volumes (named, persistent) ────────────────────────────────────────────
volumes:
  mariadb_data:
    driver: local
  postfix_spool:
    driver: local
  nginx_cache:
    driver: local
  letsencrypt:
    driver: local
  certbot_webroot:
    driver: local

# ─── secrets (Docker secret mount, .env 외부 격리) ─────────────────────────
secrets:
  fcm_service_account.json:
    file: ./secrets/fcm_service_account.json
