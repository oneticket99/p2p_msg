# TooTalk opendkim — Phase 4 DKIM 서명 milter.
# 한글 주석: KeyTable + SigningTable + TrustedHosts 의 3 layer 구성.

Syslog                  yes
SyslogSuccess           yes
LogWhy                  yes

UMask                   002
UserID                  opendkim:opendkim

Mode                    sv
SubDomains              no
AutoRestart             yes
AutoRestartRate         10/1h
SignatureAlgorithm      rsa-sha256

# Socket — inet 8891 (postfix milter chain 정합)
Socket                  inet:8891

# Key tables — entrypoint.sh 가 MAILDOMAIN + DKIM_SELECTOR 로 치환
KeyTable                /etc/opendkim/KeyTable
SigningTable            refile:/etc/opendkim/SigningTable

# Trusted hosts — 내부 docker network 의 메일 만 서명
ExternalIgnoreList      /etc/opendkim/TrustedHosts
InternalHosts           /etc/opendkim/TrustedHosts

# Canonicalization — header relaxed + body relaxed (mail forwarding 후 도 검증 PASS)
Canonicalization        relaxed/relaxed

# 본 dkim 의 minimum key size — 2048 bit (NIST 권장)
MinimumKeyBits          2048
